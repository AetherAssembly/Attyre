<svg xmlns="http://www.w3.org/2000/svg" width="240" height="220" viewBox="0 0 200 185">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="200" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E879F9"/>
      <stop offset="48%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Icon mark, centered horizontally (translate centres the 100-unit icon in 200-unit canvas) -->
  <g transform="translate(50, 6)">

    <!-- Hook -->
    <path d="M 50,26 L 53,17 L 59,11 L 67,11 L 73,17 L 71,24 L 64,27"
      fill="none" stroke="url(#grad)" stroke-width="4"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Outer hanger frame with faceted corners -->
    <path d="M 50,26 L 13,70 L 8,77 L 12,85 L 88,85 L 92,77 L 87,70 Z"
      fill="none" stroke="url(#grad)" stroke-width="4"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner A — two legs -->
    <path d="M 39,72 L 50,41 L 61,72"
      fill="none" stroke="url(#grad)" stroke-width="3.5"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner A — crossbar -->
    <line x1="43" y1="61" x2="57" y2="61"
      stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Inner A — apex diamond -->
    <path d="M 50,34 L 54,41 L 50,48 L 46,41 Z"
      fill="none" stroke="url(#grad)" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

  </g>

  <!-- Wordmark: ATTYRE -->
  <text
    x="100" y="138"
    text-anchor="middle"
    font-family="'Futura', 'Century Gothic', 'Gill Sans', 'Trebuchet MS', sans-serif"
    font-size="34" font-weight="700" letter-spacing="9"
    fill="url(#grad)">ATTYRE</text>

</svg>

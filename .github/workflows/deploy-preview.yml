name: Preview smoke test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  smoke-test:
    name: Serve & smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start HTTP server
        run: |
          python3 -m http.server 8000 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000 > /dev/null; then
              echo "Server is up."
              break
            fi
            echo "Waiting... ($i)"
            sleep 1
          done

      - name: Smoke test — key files return 200
        run: |
          PASS=true

          check() {
            local label="$1"
            local url="$2"
            local status
            status=$(curl -o /dev/null -sw "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "  PASS  $label"
            else
              echo "  FAIL  $label — got HTTP $status"
              PASS=false
            fi
          }

          echo ""
          echo "── Static files ────────────────────────────────────"
          check "index.html"          http://localhost:8000/index.html
          check "style.css"           http://localhost:8000/style.css
          check "manifest.json"       http://localhost:8000/manifest.json
          check "Privacy-Policy.html" http://localhost:8000/Privacy-Policy.html

          echo ""
          echo "── JavaScript modules ───────────────────────────────"
          check "js/app.js"                        http://localhost:8000/js/app.js
          check "js/store.js"                      http://localhost:8000/js/store.js
          check "js/engine.js"                     http://localhost:8000/js/engine.js
          check "js/pages/home.js"                 http://localhost:8000/js/pages/home.js
          check "js/pages/wardrobe.js"             http://localhost:8000/js/pages/wardrobe.js
          check "js/pages/suggest.js"              http://localhost:8000/js/pages/suggest.js
          check "js/pages/calendar.js"             http://localhost:8000/js/pages/calendar.js
          check "js/pages/stats.js"                http://localhost:8000/js/pages/stats.js
          check "js/pages/settings.js"             http://localhost:8000/js/pages/settings.js
          check "js/pages/add-item.js"             http://localhost:8000/js/pages/add-item.js
          check "js/pages/item-detail.js"          http://localhost:8000/js/pages/item-detail.js
          check "js/pages/saved-outfits.js"        http://localhost:8000/js/pages/saved-outfits.js
          check "js/components/item-card.js"       http://localhost:8000/js/components/item-card.js

          echo ""
          echo "── Assets ───────────────────────────────────────────"
          check "attyre-logo-small.svg"    http://localhost:8000/assets/attyre-logo-small.svg
          check "attyre-logo-medium.svg"   http://localhost:8000/assets/attyre-logo-medium.svg
          check "attyre-wordmark.svg"      http://localhost:8000/assets/attyre-wordmark.svg

          echo ""
          if [ "$PASS" = "true" ]; then
            echo "All checks passed."
          else
            echo "One or more checks failed — see above."
            exit 1
          fi

      - name: Validate manifest.json is valid JSON
        run: |
          if python3 -c "import json,sys; json.load(open('manifest.json'))" 2>&1; then
            echo "PASS  manifest.json is valid JSON"
          else
            echo "FAIL  manifest.json is not valid JSON"
            exit 1
          fi

      - name: Check APP_VERSION is present in js/app.js
        run: |
          if grep -qP "APP_VERSION\s*=\s*'[\d.]+'" js/app.js; then
            VERSION=$(grep -oP "APP_VERSION\s*=\s*'\K[^']+" js/app.js)
            echo "PASS  APP_VERSION = $VERSION"
          else
            echo "FAIL  APP_VERSION not found in js/app.js"
            exit 1
          fi

      - name: Stop HTTP server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      # Posts a simple pass/fail comment on the PR — updates instead of spamming
      - name: Comment result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}';
            const passed  = outcome === 'success';

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- attyre-smoke-test -->')
            );

            const sha    = context.payload.pull_request.head.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `<!-- attyre-smoke-test -->
            ${passed ? '**Smoke test passed**' : '**Smoke test failed**'} for \`${sha}\` — [view run](${runUrl})

            ${passed
              ? 'All static files, JS modules, assets, and manifest checked out fine.'
              : 'One or more checks failed. See the run log for details.'}`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

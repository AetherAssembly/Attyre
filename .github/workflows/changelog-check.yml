name: Changelog check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changelog:
    name: Check CHANGELOG.md was updated
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch enough history to diff against base branch
          fetch-depth: 0

      # Skip this check for PRs labelled 'skip-changelog' or 'chore' or 'dependencies'
      - name: Check for skip labels
        id: labels
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const skipLabels = ['skip-changelog', 'chore', 'dependencies'];
            const prLabels = context.payload.pull_request.labels.map(l => l.name);
            const shouldSkip = prLabels.some(l => skipLabels.includes(l));
            return shouldSkip ? 'true' : 'false';

      - name: Verify CHANGELOG.md was modified
        if: steps.labels.outputs.result == 'false'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if git diff --name-only "$BASE" "$HEAD" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md was updated."
          else
            echo ""
            echo "CHANGELOG.md was not updated in this PR."
            echo ""
            echo "Please add an entry under the relevant version heading."
            echo ""
            echo "To skip this check, add one of these labels to the PR:"
            echo "  - skip-changelog  (for fixes/features that genuinely don't need a note)"
            echo "  - chore           (for maintenance tasks)"
            echo "  - dependencies    (for dependency updates)"
            exit 1
          fi
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Build (Linux)
        run: npm run build && npx electron-builder --linux AppImage deb rpm

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Build (Windows)
        run: npm run build && npx electron-builder --win nsis

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            release/*.exe
            release/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Build (macOS)
        run: npm run build && npx electron-builder --mac dmg

      - uses: actions/upload-artifact@v7
        with:
          name: mac
          path: |
            release/*.dmg
            release/latest-mac.yml

  publish:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $(find artifacts -type f | sort)

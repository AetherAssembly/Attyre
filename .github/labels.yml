# GitHub labels for Attyre
# Managed by .github/workflows/label-sync.yml
# Edit here, commit to main, and the workflow will sync to GitHub automatically.

# ── Type ─────────────────────────────────────────────────────────────────────
- name: bug
  color: 'FAEAEA'
  description: Something isn't working

- name: feature
  color: 'EAF3DE'
  description: New feature or enhancement

- name: chore
  color: 'F1EFE8'
  description: Maintenance, refactors, or non-user-facing work

- name: documentation
  color: 'E6F1FB'
  description: Improvements or additions to documentation

- name: security
  color: 'FAEEDA'
  description: Security vulnerability or audit finding

# ── Status ────────────────────────────────────────────────────────────────────
- name: in-progress
  color: 'E6F1FB'
  description: Actively being worked on

- name: needs-review
  color: 'EEEDFE'
  description: Ready for review

- name: needs-info
  color: 'FAEEDA'
  description: Waiting for more information from the reporter

- name: stale
  color: 'F1EFE8'
  description: No recent activity — will be closed soon

- name: blocked
  color: 'FAEAEA'
  description: Blocked by something else

- name: do-not-merge
  color: 'FAEAEA'
  description: This PR must not be merged yet

- name: pinned
  color: 'EEEDFE'
  description: Exempt from stale closing

# ── Area ──────────────────────────────────────────────────────────────────────
- name: 'area: wardrobe'
  color: 'EAF3DE'
  description: Wardrobe management (add, edit, delete, filter)

- name: 'area: suggest'
  color: 'E6F1FB'
  description: Outfit suggestion engine or weather integration

- name: 'area: calendar'
  color: 'EEEDFE'
  description: Outfit planning calendar

- name: 'area: stats'
  color: 'FAEEDA'
  description: Stats and analytics page

- name: 'area: settings'
  color: 'F1EFE8'
  description: Settings, backup, accessibility, dark mode

- name: 'area: ui'
  color: 'EEEDFE'
  description: Visual design, CSS, layout

# ── PR labels ─────────────────────────────────────────────────────────────────
- name: dependencies
  color: 'E6F1FB'
  description: Dependency updates (Dependabot)

- name: skip-changelog
  color: 'F1EFE8'
  description: Exempt from the changelog check

# ── Size (applied automatically by pr-size.yml) ───────────────────────────────
- name: 'size: XS'
  color: 'EAF3DE'
  description: 'Diff < 10 lines'

- name: 'size: S'
  color: 'EAF3DE'
  description: 'Diff 10–49 lines'

- name: 'size: M'
  color: 'FAEEDA'
  description: 'Diff 50–249 lines'

- name: 'size: L'
  color: 'FAEEDA'
  description: 'Diff 250–499 lines'

- name: 'size: XL'
  color: 'FAEAEA'
  description: 'Diff 500+ lines — consider splitting'
